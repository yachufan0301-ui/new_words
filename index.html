<body class="bg-blue-50">
    <div id="root"></div>

    <script type="text/babel">

                        'L9': [{ word: '當成', zhuyin: ['ㄉㄤˋ', 'ㄔㄥˊ'] }, { word: '一樣', zhuyin: ['ㄧˊ', 'ㄧㄤˋ'] }, { word: '學校', zhuyin: ['ㄒㄩㄝˊ', 'ㄒㄧㄠˋ'] }, { word: '一邊', zhuyin: ['ㄧˋ', 'ㄅㄧㄢ'] }, { word: '工作', zhuyin: ['ㄍㄨㄥ', 'ㄗㄨㄛˋ'] }, { word: '校園', zhuyin: ['ㄒㄧㄠˋ', 'ㄩㄢˊ'] }, { word: '早上', zhuyin: ['ㄗㄠˇ', 'ㄕㄤˋ'] }, { word: '寶貝', zhuyin: ['ㄅㄠˇ', 'ㄅㄟˋ'] }, { word: '奶奶', zhuyin: ['ㄋㄞˇ', 'ㄋㄞ˙'] }],
                        'L10': [{ word: '青蛙', zhuyin: ['ㄑㄧㄥ', 'ㄨㄚ'] }, { word: '裝不下', zhuyin: ['ㄓㄨㄤ', 'ㄅㄨˊ', 'ㄒㄧㄚˋ'] }, { word: '世界', zhuyin: ['ㄕˋ', 'ㄐㄧㄝˋ'] }, { word: '幾天', zhuyin: ['ㄐㄧˇ', 'ㄊㄧㄢ'] }, { word: '一窪', zhuyin: ['ㄧˋ', 'ㄨㄚ'] }, { word: '說大話', zhuyin: ['ㄕㄨㄛ', 'ㄉㄚˋ', 'ㄏㄨㄚˋ'] }, { word: '肚子', zhuyin: ['ㄉㄨˋ', 'ㄗ˙'] }, { word: '東西', zhuyin: ['ㄉㄨㄥ', 'ㄒㄧ˙'] }, { word: '睡覺', zhuyin: ['ㄕㄨㄟˋ', 'ㄐㄧㄠˋ'] }, { word: '除了', zhuyin: ['ㄔㄨˊ', 'ㄌㄜ˙'] }, { word: '一隻', zhuyin: ['ㄧˋ', 'ㄓ'] }],
                        'L11': [{ word: '外面', zhuyin: ['ㄨㄞˋ', 'ㄇㄧㄢˋ'] }, { word: '鴨子', zhuyin: ['ㄧㄚ', 'ㄗ˙'] }, { word: '星星', zhuyin: ['ㄒㄧㄥ', '˙ㄒㄧㄥ'] }, { word: '奇怪', zhuyin: ['ㄑㄧˊ', 'ㄍㄨㄞˋ'] }, { word: '吃光', zhuyin: ['ㄔ', 'ㄍㄨㄤ'] }, { word: '告訴', zhuyin: ['ㄍㄠˋ', 'ㄙㄨˋ'] }, { word: '快樂', zhuyin: ['ㄎㄨㄞˋ', 'ㄌㄜˋ'] }, { word: '不見', zhuyin: ['ㄅㄨˊ', 'ㄐㄧㄢˋ'] }, { word: '波紋', zhuyin: ['ㄅㄛ', 'ㄨㄣˊ'] }, { word: '一圈', zhuyin: ['ㄧˋ', 'ㄑㄩㄢ'] }, { word: '池塘', zhuyin: ['ㄔˊ', 'ㄊㄤˊ'] }, { word: '許多', zhuyin: ['ㄒㄩˇ', 'ㄉㄨㄛ'] }],
                        'L12': [{ word: '加油', zhuyin: ['ㄐㄧㄚ', 'ㄧㄡˊ'] }, { word: '辛苦', zhuyin: ['ㄒㄧㄣ', 'ㄎㄨˇ'] }, { word: '地瓜苗', zhuyin: ['ㄉㄧˋ', 'ㄍㄨㄚ', 'ㄇㄧㄠˊ'] }, { word: '種田', zhuyin: ['ㄓㄨㄥˋ', 'ㄊㄧㄢˊ'] }, { word: '小豬', zhuyin: ['ㄒㄧㄠˇ', 'ㄓㄨ'] }, { word: '一半', zhuyin: ['ㄧˊ', 'ㄅㄢˋ'] }, { word: '不止', zhuyin: ['ㄅㄨˋ', 'ㄓˇ'] }, { word: '分享', zhuyin: ['ㄈㄣ', 'ㄒㄧㄤˇ'] }, { word: '地瓜葉', zhuyin: ['ㄉㄧˋ', 'ㄍㄨㄚ', 'ㄧㄝˋ'] }, { word: '收成', zhuyin: ['ㄕㄡ', 'ㄔㄥˊ'] }, { word: '不能', zhuyin: ['ㄅㄨˋ', 'ㄋㄥˊ'] }]
                    },
                    '多音字': {}, '形近字': {}, '成語': {}
                }
            },
            hugo: {
                id: 'hugo', title: 'Hugo (G4)',
                categories: {
                    '圈詞': { 
                        'L7': [{ word: '攜手', zhuyin: ['ㄒㄧ', 'ㄕㄡˇ'] }, { word: '惡化', zhuyin: ['ㄜˋ', 'ㄏㄨㄚˋ'] }, { word: '導致', zhuyin: ['ㄉㄠˇ', 'ㄓˋ'] }, { word: '變遷', zhuyin: ['ㄅㄧㄢˋ', 'ㄑㄧㄢ'] }, { word: '平均', zhuyin: ['ㄆㄧㄥˊ', 'ㄐㄩㄣ'] }, { word: '分配', zhuyin: ['ㄈㄣ', 'ㄆㄟˋ'] }, { word: '饑荒', zhuyin: ['ㄐㄧ', 'ㄏㄨㄤ'] }, { word: '鍵盤', zhuyin: ['ㄐㄧㄢˋ', 'ㄆㄢˊ'] }, { word: '傳輸', zhuyin: ['ㄔㄨㄢˊ', 'ㄕㄨ'] }, { word: '移動', zhuyin: ['ㄧˊ', 'ㄉㄨㄥˋ'] }, { word: '足跡', zhuyin: ['ㄗㄨˊ', 'ㄐㄧ'] }],
                        'L8': [{ word: '輕而易舉', zhuyin: ['ㄑㄧㄥ', 'ㄦˊ', 'ㄧˋ', 'ㄐㄩˇ'] }, { word: '研究', zhuyin: ['ㄧㄢˊ', 'ㄐㄧㄡˋ'] }, { word: '肢體', zhuyin: ['ㄓ', 'ㄊㄧˇ'] }, { word: '身懷絕技', zhuyin: ['ㄕㄣ', 'ㄏㄨㄞˊ', 'ㄐㄩㄝˊ', 'ㄐㄧˋ'] }, { word: '輕易', zhuyin: ['ㄑㄧㄥ', 'ㄧˋ'] }, { word: '構造', zhuyin: ['ㄍㄡˋ', 'ㄗㄠˋ'] }, { word: '腳趾', zhuyin: ['ㄐㄧㄠˇ', 'ㄓˇ'] }, { word: '得天獨厚', zhuyin: ['ㄉㄜˊ', 'ㄊㄧㄢ', 'ㄉㄨˊ', 'ㄌㄧㄥˋ'] }, { word: '看家本領', zhuyin: ['ㄎㄢ', 'ㄐㄧㄚ', 'ㄅㄣˇ', 'ㄌㄧㄥˇ'] }, { word: '與眾不同', zhuyin: ['ㄩˇ', 'ㄓㄨㄥˋ', 'ㄅㄨˋ', 'ㄊㄨㄥˊ'] }, { word: '壁虎', zhuyin: ['ㄅㄧˋ', 'ㄏㄨˇ'] }, { word: '絕技', zhuyin: ['ㄐㄩㄝˊ', 'ㄐㄧˋ'] }, { word: '易如反掌', zhuyin: ['ㄧˋ', 'ㄖㄨˊ', 'ㄈㄢˇ', 'ㄓㄤˇ'] }],
                        'L9': [{ word: '催生', zhuyin: ['ㄘㄨㄟ', 'ㄕㄥ'] }, { word: '吸引', zhuyin: ['ㄒㄧ', 'ㄧㄣˇ'] }, { word: '嚮往', zhuyin: ['ㄒㄧㄤˋ', 'ㄨㄤˇ'] }, { word: '大富翁', zhuyin: ['ㄉㄚˋ', 'ㄈㄨˋ', 'ㄨㄥ'] }, { word: '太空總署', zhuyin: ['ㄊㄞˋ', 'ㄎㄨㄥ', 'ㄗㄨㄥˇ', 'ㄕㄨˇ'] }, { word: '探測', zhuyin: ['ㄊㄢˋ', 'ㄘㄜˋ'] }, { word: '嘗試', zhuyin: ['ㄔㄤˊ', 'ㄕˋ'] }, { word: '津津樂道', zhuyin: ['ㄐㄧㄣ', 'ㄐㄧㄣ', 'ㄌㄜˋ', 'ㄉㄠˋ'] }, { word: '阿姆斯壯', zhuyin: ['ㄚ', 'ㄇㄨˇ', 'ㄙ', 'ㄓㄨㄤˋ'] }, { word: '不僅', zhuyin: ['ㄅㄨˋ', 'ㄐㄧㄣˇ'] }],
                        'L10': [{ word: '遺憾', zhuyin: ['ㄧˊ', 'ㄏㄢˋ'] }, { word: '耗盡', zhuyin: ['ㄏㄠˋ', 'ㄐㄧㄣˋ'] }, { word: '旱災', zhuyin: ['ㄏㄢˋ', 'ㄗㄞ'] }, { word: '水災', zhuyin: ['ㄕㄟˇ', 'ㄗㄞ'] }, { word: '萬丈', zhuyin: ['ㄨㄢˋ', 'ㄓㄤˋ'] }, { word: '寬廣', zhuyin: ['ㄎㄨㄢ', 'ㄍㄨㄤˇ'] }, { word: '一望無際', zhuyin: ['ㄧˊ', 'ㄨㄤˋ', 'ㄨˊ', 'ㄐㄧˋ'] }, { word: '禁不住', zhuyin: ['ㄐㄧㄣ', 'ㄅㄨˊ', 'ㄓㄨˋ'] }, { word: '打滾', zhuyin: ['ㄉㄚˇ', 'ㄍㄨㄣˇ'] }, { word: '忽然', zhuyin: ['ㄏㄨ', 'ㄖㄢˊ'] }, { word: '自豪', zhuyin: ['ㄗˋ', 'ㄏㄠˊ'] }],
                        'L11': [{ word: '孤單', zhuyin: ['ㄍㄨ', 'ㄉㄢ'] }, { word: '淚水', zhuyin: ['ㄌㄟˋ', 'ㄕㄨㄟˇ'] }, { word: '依舊', zhuyin: ['ㄧ', 'ㄐㄧㄡˋ'] }, { word: '是否', zhuyin: ['ㄕˋ', 'ㄈㄡˇ'] }, { word: '浮現', zhuyin: ['ㄈㄨˊ', 'ㄒㄧㄢˋ'] }, { word: '映照', zhuyin: ['ㄧㄥˋ', 'ㄓㄠˋ'] }, { word: '冰霜', zhuyin: ['ㄅㄧㄥ', 'ㄕㄨㄤ'] }, { word: '吳剛', zhuyin: ['ㄨˊ', 'ㄍㄤ'] }, { word: '嫦娥', zhuyin: ['ㄔㄤˊ', 'ㄜˊ'] }, { word: '皎潔', zhuyin: ['ㄐㄧㄠˇ', 'ㄐㄧㄝˊ'] }],
                        'L12': [{ word: '掀翻', zhuyin: ['ㄒㄧㄢ', 'ㄈㄢ'] }, { word: '呼風喚雨', zhuyin: ['ㄏㄨ', 'ㄈㄥ', 'ㄏㄨㄢˋ', 'ㄩˇ'] }, { word: '金箍棒', zhuyin: ['ㄐㄧㄣ', 'ㄍㄨ', 'ㄅㄤˋ'] }, { word: '筋斗雲', zhuyin: ['ㄐㄧㄣ', 'ㄉㄡˇ', 'ㄩㄣˊ'] }, { word: '乖乖', zhuyin: ['ㄍㄨㄞ', 'ㄍㄨㄞ'] }, { word: '壓住', zhuyin: ['ㄧㄚ', 'ㄓㄨˋ'] }, { word: '齊天大聖', zhuyin: ['ㄑㄧˊ', 'ㄊㄧㄢ', 'ㄉㄚˋ', 'ㄕㄥˋ'] }, { word: '掏出', zhuyin: ['ㄊㄠ', 'ㄔㄨ'] }, { word: '咒語', zhuyin: ['ㄓㄡˋ', 'ㄩˇ'] }, { word: '修行', zhuyin: ['ㄒㄧㄡ', 'ㄒㄧㄥˊ'] }]
                    },
                    '多音字': {}, '形近字': {}, '成語': {}
                }
            }
        };

        const { useState } = React;

        const ZhuyinBlock = ({ text }) => {
            const cleanText = text.trim();
            const tones = ['ˊ', 'ˇ', 'ˋ', '˙'];
            let tone = '';
            const chars = [];
            for (let char of cleanText) {
                if (tones.includes(char)) tone = char;
                else chars.push(char);
            }
            return (
                <div className="flex flex-col justify-between h-20 w-8 relative no-select">
                    {chars.map((char, index) => {
                        const isFirst = index === 0;
                        const isLast = index === chars.length - 1;
                        return (
                            <div key={index} className="relative flex justify-center items-center flex-1 leading-none">
                                <span className="font-bold text-blue-900 text-3xl select-none">{char}</span>
                                {isLast && tone && tone !== '˙' && <span className="absolute left-full ml-2 text-2xl font-bold text-blue-900 leading-none select-none">{tone}</span>}
                                {isFirst && tone === '˙' && <span className="absolute bottom-full mb-1 text-2xl font-bold text-blue-900 leading-none left-1/2 -translate-x-1/2 select-none">˙</span>}
                            </div>
                        );
                    })}
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('home');
            const [student, setStudent] = useState(null);
            const [category, setCategory] = useState(null);
            const [quiz, setQuiz] = useState({ items: [], title: '', mode: 'char', index: 0, results: [], showAnswer: false });

            const startQuiz = (items, title, mode) => {
                setQuiz({ items, title, mode, index: 0, results: [], showAnswer: false });
                setView('quiz');
            };

            if (view === 'home') return (
                <div className="min-h-screen bg-blue-50 p-8 flex flex-col items-center justify-center">
                    <h1 className="text-5xl font-bold text-blue-900 mb-20">📝 圈詞好棒棒</h1>
                    <div className="grid grid-cols-1 gap-10 w-full max-w-md">
                        {Object.entries(quizData).map(([key, data]) => (
                            <button key={key} onClick={() => { setStudent(data); setView('category-select'); }} className="bg-white p-12 rounded-[2rem] shadow-xl border-4 border-blue-200 hover:border-blue-400 transition-all text-4xl font-bold text-blue-800">{data.title}</button>
                        ))}
                    </div>
                </div>
            );

            if (view === 'category-select') return (
                <div className="min-h-screen bg-blue-50 p-8 max-w-2xl mx-auto">
                    <button onClick={() => setView('home')} className="mb-8 text-blue-700 font-bold hover:underline">← 返回</button>
                    <h2 className="text-4xl font-bold text-blue-900 mb-8 text-center">{student.title} 的練習類別</h2>
                    <div className="grid grid-cols-2 gap-4">
                        {Object.keys(student.categories).map(cat => (
                            <button key={cat} onClick={() => { setCategory(cat); setView('lesson-select'); }} className="bg-white p-6 rounded-2xl shadow-lg border-2 border-blue-100 font-bold text-xl text-blue-800 hover:border-blue-400">{cat}</button>
                        ))}
                    </div>
                </div>
            );

            if (view === 'lesson-select') return (
                <div className="min-h-screen bg-blue-50 p-8 max-w-2xl mx-auto">
                    <button onClick={() => setView('category-select')} className="mb-8 text-blue-700 font-bold hover:underline">← 返回</button>
                    <h2 className="text-3xl font-bold text-blue-900 mb-8 text-center">{category} 課次</h2>
                    <div className="grid grid-cols-1 gap-4">
                        {Object.entries(student.categories[category]).length > 0 ? Object.entries(student.categories[category]).map(([lesson, items]) => (
                            <div key={lesson} className="bg-white p-6 rounded-2xl shadow-md border border-blue-100 flex justify-between items-center">
                                <span className="text-xl font-bold">{lesson} ({items.length} 題)</span>
                                <div className="flex gap-2">
                                    <button onClick={() => startQuiz(items, `${category} ${lesson}`, 'char')} className="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold">考國字</button>
                                    <button onClick={() => startQuiz(items, `${category} ${lesson}`, 'zhuyin')} className="bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-bold">考注音</button>
                                </div>
                            </div>
                        )) : <div className="text-center text-gray-500">此類別暫無題目</div>}
                    </div>
                </div>
            );

            if (view === 'quiz') {
                const item = quiz.items[quiz.index];
                return (
                    <div className="min-h-screen bg-blue-50 p-6 flex flex-col items-center justify-center">
                        <div className="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-lg">
                            <div className="flex justify-between mb-6">
                                <span className="font-bold text-blue-800 bg-blue-100 px-4 py-2 rounded-xl">{quiz.title}</span>
                                <span className="font-bold text-blue-500 bg-blue-50 px-4 py-2 rounded-xl">{quiz.index + 1} / {quiz.items.length}</span>
                            </div>
                            <div className="flex flex-col items-center gap-8 py-8 mb-4">
                                {item.word.split('').map((char, i) => (
                                    <div key={i} className="flex gap-8 items-center w-full justify-center pb-8 border-b-2 last:border-0">
                                        <div className="w-24 h-24 border-4 border-blue-100 rounded-2xl flex items-center justify-center text-5xl font-bold bg-white">{quiz.showAnswer || quiz.mode === 'zhuyin' ? char : '？'}</div>
                                        <div className="h-24 flex items-center justify-center bg-gray-50 rounded-2xl px-2 w-24">
                                            {quiz.showAnswer || quiz.mode === 'char' ? <ZhuyinBlock text={item.zhuyin[i]}/> : <span className="text-gray-400 font-bold">注音</span>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            {!quiz.showAnswer ? 
                                <button onClick={() => setQuiz({...quiz, showAnswer: true})} className="w-full bg-blue-600 text-white py-6 rounded-2xl font-bold text-2xl">查看答案</button> :
                                <button onClick={() => { const next = quiz.index + 1; if(next < quiz.items.length) setQuiz({...quiz, index: next, showAnswer: false}); else setView('home'); }} className="w-full bg-emerald-500 text-white py-6 rounded-2xl font-bold text-2xl">下一題</button>
                            }
                        </div>
                    </div>
                );
            }
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

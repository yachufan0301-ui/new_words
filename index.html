        const ZhuyinBlock = ({ text }) => {
          const cleanText = text.trim();
          const tones = ['ˊ', 'ˇ', 'ˋ', '˙'];
          let tone = '';
          const chars = [];

          // 分離聲調與注音符號
          for (let char of cleanText) {
            if (tones.includes(char)) {
              tone = char;
            } else {
              chars.push(char);
            }
          }

          return (
            <div className="flex flex-col justify-between h-20 w-8 relative no-select">
              {chars.map((char, index) => {
                const isFirst = index === 0;
                const isLast = index === chars.length - 1;

                return (
                  <div key={index} className="relative flex justify-center items-center flex-1 leading-none">
                    {/* 注音符號本體 */}
                    <span className="font-bold text-blue-900 text-3xl select-none">{char}</span>

                    {/* 規則 1：一般聲調（ˊ、ˇ、ˋ）強制顯示在最後一個注音符號的右側 */}
                    {isLast && tone && tone !== '˙' && (
                      <span className="absolute left-full ml-2 text-2xl font-bold text-blue-900 leading-none select-none">
                        {tone}
                      </span>
                    )}

                    {/* 規則 2：輕聲（˙）強制顯示在第一個注音符號的正上方 */}
                    {isFirst && tone === '˙' && (
                      <span className="absolute bottom-full mb-1 text-2xl font-bold text-blue-900 leading-none left-1/2 -translate-x-1/2 select-none font-sans">
                        ˙
                      </span>
                    )}
                  </div>
                );
              })}
            </div>
          );
        };

        function App() {
          const [view, setView] = useState('home');
          const [currentStudent, setCurrentStudent] = useState(null);
          const [quiz, setQuiz] = useState({ items: [], sectionName: '', mode: null, index: 0, results: [], showAnswer: false });

          const startQuiz = (items, sectionName, mode) => {
            setQuiz({ items, sectionName, mode, index: 0, results: [], showAnswer: false });
            setView('quiz');
          };

          const handleAnswer = (isCorrect) => {
            const newResults = [...quiz.results, { item: quiz.items[quiz.index], isCorrect }];
            if (quiz.index < quiz.items.length - 1) {
              setQuiz({...quiz, index: quiz.index + 1, results: newResults, showAnswer: false});
            } else {
              setQuiz({...quiz, results: newResults});
              setView('summary');
            }
          };

          if (view === 'home') return (
            <div className="min-h-screen bg-blue-50 p-8 flex flex-col items-center justify-center font-sans">
              <h1 className="text-5xl font-bold text-blue-900 mb-20 drop-shadow-sm">📝 圈詞好棒棒</h1>
              <div className="grid grid-cols-1 gap-10 w-full max-w-md">
                {Object.entries(quizData).map(([key, data]) => (
                  <button key={key} onClick={() => { setCurrentStudent(data); setView('student'); }} className="bg-white p-12 rounded-[2rem] shadow-xl border-4 border-blue-200 hover:border-blue-400 hover:shadow-2xl hover:-translate-y-1 transition-all text-4xl font-bold text-blue-800">
                    {data.title}
                  </button>
                ))}
              </div>
            </div>
          );

          if (view === 'student') return (
            <div className="min-h-screen bg-blue-50 p-8 font-sans max-w-2xl mx-auto">
              <button onClick={() => setView('home')} className="mb-8 text-xl text-blue-700 font-bold hover:underline flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                返回
              </button>
              <h2 className="text-4xl font-bold text-blue-900 mb-8 text-center bg-blue-100 py-4 rounded-3xl">{currentStudent.title} 的任務</h2>
              
              {Object.keys(currentStudent.sections).length === 0 ? (
                <div className="text-center text-gray-500 text-xl py-12 bg-white rounded-[2rem] shadow-lg">
                  目前還沒有建立題庫喔！
                </div>
              ) : (
                <div className="grid grid-cols-1 gap-6 max-h-[70vh] overflow-y-auto pr-2">
                  {Object.entries(currentStudent.sections).map(([name, items]) => (
                    <div key={name} className="bg-white p-8 rounded-[2rem] shadow-lg border-2 border-blue-100 hover:border-blue-300 transition-colors">
                      <h3 className="text-2xl font-bold text-gray-700 mb-6 tracking-wider border-b-2 border-blue-50 pb-4">{name} <span className="text-base font-normal text-gray-400 bg-gray-100 px-3 py-1 rounded-full ml-2">共 {items.length} 題</span></h3>
                      <div className="flex gap-6">
                        <button onClick={() => startQuiz(items, name, 'char')} className="flex-1 bg-blue-600 text-white py-5 rounded-2xl font-bold text-xl hover:bg-blue-700 hover:shadow-lg transition-all active:scale-95">考國字</button>
                        <button onClick={() => startQuiz(items, name, 'zhuyin')} className="flex-1 bg-emerald-600 text-white py-5 rounded-2xl font-bold text-xl hover:bg-emerald-700 hover:shadow-lg transition-all active:scale-95">考注音</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );

          if (view === 'summary') {
            const correctCount = quiz.results.filter(r => r.isCorrect).length;
            const errors = quiz.results.filter(r => !r.isCorrect);
            const score = Math.round((correctCount / quiz.items.length) * 100);
            
            return (
              <div className="min-h-screen bg-blue-50 p-6 flex flex-col items-center justify-center font-sans">
                <div className="bg-white p-10 rounded-[2rem] shadow-2xl w-full max-w-lg text-center border-t-8 border-blue-500">
                  <h2 className="text-4xl font-bold mb-4 text-gray-800">練習結束！</h2>
                  <div className="text-6xl mb-6">{score === 100 ? '🌟' : score >= 80 ? '👍' : '💪'}</div>
                  <p className="text-2xl mb-8 text-gray-700">答對題數：<span className="font-bold text-emerald-600 text-3xl">{correctCount}</span> / {quiz.items.length}</p>
                  
                  {errors.length > 0 && (
                    <div className="text-left bg-rose-50 p-6 rounded-2xl mb-8 border-2 border-rose-100">
                      <h3 className="text-xl font-bold text-rose-800 mb-4 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                        需加強的題目：
                      </h3>
                      <div className="flex flex-col gap-3">
                        {errors.map((err, i) => (
                          <div key={i} className="flex justify-between items-center bg-white py-3 px-4 rounded-xl shadow-sm">
                            <span className="font-bold text-2xl tracking-widest text-gray-800">{err.item.word}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  
                  <button onClick={() => setView('home')} className="w-full bg-blue-900 text-white py-6 rounded-2xl font-bold text-xl hover:bg-blue-800 hover:shadow-lg transition-all active:scale-95">回首頁</button>
                </div>
              </div>
            );
          }

          const item = quiz.items[quiz.index];
          return (
            <div className="min-h-screen bg-blue-50 p-6 flex flex-col items-center justify-center font-sans">
              <div className="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-lg">
                <div className="flex justify-between items-center mb-6">
                  <div className="font-bold text-blue-800 bg-blue-100 px-4 py-2 rounded-xl text-lg">{quiz.sectionName}</div>
                  <div className="font-bold text-blue-500 text-lg bg-blue-50 px-4 py-2 rounded-xl">第 {quiz.index + 1} / {quiz.items.length} 題</div>
                </div>
                
                {/* Progress Bar */}
                <div className="w-full bg-gray-100 rounded-full h-2.5 mb-8">
                  <div className="bg-blue-500 h-2.5 rounded-full transition-all duration-300" style={{ width: `${((quiz.index) / quiz.items.length) * 100}%` }}></div>
                </div>

                <div className="flex flex-col items-center gap-8 py-8 mb-4 max-h-[50vh] overflow-y-auto">
                  {item.word.split('').map((char, i) => (
                    <div key={i} className="flex gap-8 items-center border-b-2 border-dashed border-gray-100 pb-8 w-full justify-center last:border-0">
                      <div className="w-28 h-28 border-4 border-blue-100 rounded-[2rem] flex items-center justify-center text-6xl font-bold bg-white shadow-inner text-gray-800 select-none">
                        {quiz.showAnswer || quiz.mode === 'zhuyin' ? char : '？'}
                      </div>
                      <div className="h-28 flex items-center justify-center bg-gray-50 rounded-[2rem] px-4 w-28 shadow-inner border-2 border-gray-100">
                        {quiz.showAnswer || quiz.mode === 'char' ? <ZhuyinBlock text={item.zhuyin[i]}/> : <div className="text-gray-400 font-bold text-xl select-none">注音</div>}
                      </div>
                    </div>
                  ))}
                </div>

                {!quiz.showAnswer ? 
                  <button onClick={() => setQuiz({...quiz, showAnswer: true})} className="w-full bg-blue-600 text-white py-6 rounded-2xl font-bold text-2xl hover:bg-blue-700 hover:shadow-lg transition-all active:scale-95">查看答案</button> :
                  <div className="flex gap-6 animate-fade-in">
                    <button onClick={() => handleAnswer(false)} className="flex-1 bg-rose-500 text-white py-6 rounded-2xl font-bold text-2xl hover:bg-rose-600 hover:shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                      <svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                      錯誤
                    </button>
                    <button onClick={() => handleAnswer(true)} className="flex-1 bg-emerald-500 text-white py-6 rounded-2xl font-bold text-2xl hover:bg-emerald-600 hover:shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                      <svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                      正確
                    </button>
                  </div>
                }
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

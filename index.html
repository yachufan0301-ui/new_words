                                        <>
                                            <button onClick={() => startQuiz(items, `${category} ${lesson}`, 'char')} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl text-lg font-bold transition-colors shadow-md">考國字</button>
                                            <button onClick={() => startQuiz(items, `${category} ${lesson}`, 'zhuyin')} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl text-lg font-bold transition-colors shadow-md">考注音</button>
                                        </>
                                    )}
                                </div>
                            </div>
                        )) : <div className="text-center text-gray-500 py-10 bg-white rounded-2xl">此類別暫無題目</div>}
                    </div>
                </div>
            );

            if (view === 'quiz') {
                const item = quiz.items[quiz.index];
                
                if (quiz.mode === 'idiom') {
                    return (
                        <div className="min-h-screen bg-blue-50 p-4 sm:p-6 flex flex-col items-center justify-center">
                            <div className="bg-white p-6 sm:p-8 rounded-[2.5rem] shadow-xl w-full max-w-lg">
                                <div className="flex justify-between items-center mb-6">
                                    <span className="font-bold text-blue-800 bg-blue-100 px-5 py-2 rounded-xl text-lg">{quiz.title}</span>
                                    <span className="font-bold text-blue-600 bg-blue-50 px-5 py-2 rounded-xl text-lg border border-blue-100">{quiz.index + 1} / {quiz.items.length}</span>
                                </div>
                                
                                <div className="py-10 px-6 mb-6 bg-amber-50 rounded-3xl shadow-inner border border-amber-100 text-center">
                                    <h3 className="text-2xl sm:text-3xl font-bold text-amber-900 leading-relaxed">{item.question}</h3>
                                </div>
                                
                                    <div className="grid grid-cols-1 gap-4 w-full mb-6">
                                    {item.shuffledOptions.map((opt, idx) => {
                                        const isCorrect = opt.text === item.answer;
                                        let btnClass = "bg-white border-blue-100 hover:border-blue-400 hover:-translate-y-1 shadow-sm text-blue-900";
                                        
                                        if (quiz.showAnswer) {
                                            if (isCorrect) btnClass = "bg-emerald-50 border-emerald-400 shadow-md text-emerald-700";
                                            else if (quiz.selectedOption === idx) btnClass = "bg-red-50 border-red-400 text-red-700";
                                            else btnClass = "bg-gray-50 border-gray-100 opacity-40 text-gray-400";
                                        }

                                        return (
                                            <button key={idx} 
                                                disabled={quiz.showAnswer}
                                                onClick={() => {
                                                    const newErrors = isCorrect ? quiz.errors : [...quiz.errors, item];
                                                    setQuiz({...quiz, selectedOption: idx, isCorrect, showAnswer: true, errors: newErrors});
                                                }}
                                                className={`p-5 rounded-2xl border-2 transition-all flex flex-col items-center justify-center gap-2 text-2xl font-bold ${btnClass}`}>
                                                <div className="flex flex-row flex-wrap items-center justify-center gap-1">
                                                    {opt.text.split('').map((char, charIdx) => (
                                                        <div key={charIdx} className="flex flex-row items-center">
                                                            <span className="text-3xl">{char}</span>
                                                            {opt.zhuyin[charIdx] && <ZhuyinBlock text={opt.zhuyin[charIdx]} />}
                                                        </div>
                                                    ))}
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>

                                {quiz.showAnswer && (
                                    <button onClick={() => { 
                                        if(quiz.index + 1 < quiz.items.length) { 
                                            setQuiz({...quiz, index: quiz.index + 1, showAnswer: false, selectedOption: null}); 
                                        } else { 
                                            endQuiz(); 
                                        } 
                                    }} className="w-full bg-emerald-500 hover:bg-emerald-600 transition-colors text-white py-4 rounded-2xl font-bold text-xl shadow-lg mt-2 animate-pulse">
                                        下一題
                                    </button>
                                )}
                            </div>
                        </div>
                    );
                }

                if (quiz.mode === 'poly') {
                    const polyCharIndex = item.polyCharIndex;
                    const options = item.options || [];
                    const correctZhuyin = polyCharIndex !== -1 ? item.zhuyin[polyCharIndex] : '';
                    
                    return (
                        <div className="min-h-screen bg-blue-50 p-4 sm:p-6 flex flex-col items-center justify-center">
                            <div className="bg-white p-6 sm:p-8 rounded-[2.5rem] shadow-xl w-full max-w-lg">
                                <div className="flex justify-between items-center mb-6">
                                    <span className="font-bold text-blue-800 bg-blue-100 px-5 py-2 rounded-xl text-lg">{quiz.title}</span>
                                    <span className="font-bold text-blue-600 bg-blue-50 px-5 py-2 rounded-xl text-lg border border-blue-100">{quiz.index + 1} / {quiz.items.length}</span>
                                </div>
                                <div className="flex flex-wrap items-center justify-center gap-3 py-6 mb-6 bg-blue-50 rounded-3xl shadow-inner border border-blue-100">
                                    {item.word.split('').map((char, i) => (
                                        <div key={i} className="flex flex-col items-center gap-2">
                                            <div className="w-16 h-16 sm:w-20 sm:h-20 border-2 border-blue-200 rounded-2xl flex items-center justify-center text-4xl font-bold bg-white shadow-sm text-blue-900">{char}</div>
                                            <div className="h-20 flex items-center justify-center bg-white border border-blue-100 rounded-xl px-1 w-16 sm:w-20 shadow-sm">
                                                {i === polyCharIndex && !quiz.showAnswer ? <span className="text-gray-300 font-bold text-2xl">？</span> : <ZhuyinBlock text={item.zhuyin[i]} />}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex flex-wrap justify-center gap-2 w-full mb-6">
                                    {options.map((opt, idx) => (
                                        <button key={idx} onClick={() => {
                                            const isCorrect = opt === correctZhuyin;
                                            const newErrors = isCorrect ? quiz.errors : [...quiz.errors, item];
                                            setQuiz({...quiz, selectedOption: idx, isCorrect, showAnswer: true, errors: newErrors});
                                        }} disabled={quiz.showAnswer} className={`p-2 rounded-xl border-2 text-center transition-all flex justify-center items-center h-24 w-24 ${quiz.showAnswer ? (opt === correctZhuyin ? 'bg-emerald-50 border-emerald-400 shadow-md' : (quiz.selectedOption === idx ? 'bg-red-50 border-red-400' : 'bg-gray-50 border-gray-100 opacity-40')) : 'bg-white border-blue-100 hover:border-blue-400 hover:-translate-y-1 shadow-sm'}`}>
                                            <ZhuyinBlock text={opt} />
                                        </button>
                                    ))}
                                </div>
                                {quiz.showAnswer && <button onClick={() => { if(quiz.index + 1 < quiz.items.length) { setQuiz({...quiz, index: quiz.index + 1, showAnswer: false, selectedOption: null}); } else { endQuiz(); } }} className="w-full bg-emerald-500 hover:bg-emerald-600 transition-colors text-white py-4 rounded-2xl font-bold text-xl shadow-lg mt-2 animate-pulse">下一題</button>}
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="min-h-screen bg-blue-50 p-4 sm:p-6 flex flex-col items-center justify-center">
                        <div className="bg-white p-6 sm:p-8 rounded-[2.5rem] shadow-xl w-full max-w-lg">
                            <div className="flex justify-between items-center mb-8">
                                <span className="font-bold text-blue-800 bg-blue-100 px-5 py-2 rounded-xl text-lg">{quiz.title}</span>
                                <span className="font-bold text-blue-600 bg-blue-50 px-5 py-2 rounded-xl text-lg border border-blue-100">{quiz.index + 1} / {quiz.items.length}</span>
                            </div>
                            <div className="flex flex-col items-center gap-6 py-6 mb-6">
                                {item.word.split('').map((char, i) => (
                                    <div key={i} className="flex gap-6 sm:gap-8 items-center w-full justify-center">
                                        <div className="w-24 h-28 sm:w-28 sm:h-32 border-4 border-blue-100 rounded-2xl flex items-center justify-center text-5xl sm:text-6xl font-bold bg-white text-blue-900 shadow-sm">{quiz.showAnswer || quiz.mode === 'zhuyin' ? char : '？'}</div>
                                        <div className="h-28 sm:h-32 flex items-center justify-center bg-gray-50 border-2 border-gray-100 rounded-2xl px-2 w-24 sm:w-28 shadow-sm">
                                            {quiz.showAnswer || quiz.mode === 'char' ? <ZhuyinBlock text={item.zhuyin[i]}/> : <span className="text-gray-300 font-bold text-2xl">注音</span>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            {!quiz.showAnswer ? 
                                <button onClick={() => setQuiz({...quiz, showAnswer: true})} className="w-full bg-blue-600 hover:bg-blue-700 transition-colors text-white py-6 rounded-2xl font-bold text-2xl shadow-lg mt-4">查看答案</button> :
                                <div className="grid grid-cols-2 gap-4 mt-4">
                                    <button onClick={() => { 
                                        if(quiz.index + 1 < quiz.items.length) setQuiz({...quiz, index: quiz.index + 1, showAnswer: false}); 
                                        else endQuiz(); 
                                    }} className="bg-emerald-500 hover:bg-emerald-600 transition-colors text-white py-6 rounded-2xl font-bold text-xl shadow-md">我答對了！</button>
                                    <button onClick={() => { 
                                        const newErrors = [...quiz.errors, item]; 
                                        if(quiz.index + 1 < quiz.items.length) {
                                            setQuiz({...quiz, index: quiz.index + 1, showAnswer: false, errors: newErrors}); 
                                        } else {
                                            setQuiz({...quiz, errors: newErrors});
                                            endQuiz(); 
                                        }
                                    }} className="bg-red-500 hover:bg-red-600 transition-colors text-white py-6 rounded-2xl font-bold text-xl shadow-md">我答錯了！</button>
                                </div>
                            }
                        </div>
                    </div>
                );
            }
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
